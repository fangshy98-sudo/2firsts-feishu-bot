name: Push 2Firsts Daily Report

on:
  schedule:
    - cron: "5 1 * * *"
  workflow_dispatch:

jobs:
  run-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Generate preview only
        env:
          PREVIEW_ONLY: "true"
          FEISHU_KEYWORD: ${{ secrets.FEISHU_KEYWORD }}
        run: node index.js

      - name: Upload preview artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 2firsts-preview
          path: preview/
