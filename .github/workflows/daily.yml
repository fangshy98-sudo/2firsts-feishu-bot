name: Push 2Firsts Daily Report

on:
  # schedule:
  #   # GitHub Actions cron uses UTC.
  #   # 30 1 * * * = 09:30 Asia/Shanghai -> push to group A
  #   - cron: "30 1 * * *"
  #   # 30 2 * * * = 10:30 Asia/Shanghai -> push to group B
  #   - cron: "30 2 * * *"
  workflow_dispatch:
    inputs:
      target_date:
        description: Optional date in YYYY-MM-DD format. Leave blank to use today in Asia/Shanghai.
        required: false
        default: ""
      preview_only:
        description: true = only generate preview artifact, false = actually send to Feishu
        required: true
        type: choice
        options:
          - "false"
          - "true"
        default: "false"
      target_group:
        # Manual runs choose the target group here.
        description: Select which Feishu group should receive the manual run.
        required: true
        type: choice
        options:
          - "A"
          - "B"
        default: "A"

jobs:
  run-job:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # If you re-enable the cron strings above, keep the matching
      # github.event.schedule values below in sync as well.
      - name: Resolve target A schedule
        if: github.event_name == 'schedule' && github.event.schedule == '30 1 * * *'
        env:
          FEISHU_WEBHOOK_VALUE: ${{ secrets.FEISHU_WEBHOOK_A }}
          FEISHU_SECRET_VALUE: ${{ secrets.FEISHU_SECRET_A }}
          FEISHU_KEYWORD_VALUE: ${{ secrets.FEISHU_KEYWORD_A }}
        run: |
          echo "PUSH_TARGET=A" >> "$GITHUB_ENV"
          echo "FEISHU_WEBHOOK=$FEISHU_WEBHOOK_VALUE" >> "$GITHUB_ENV"
          echo "FEISHU_SECRET=$FEISHU_SECRET_VALUE" >> "$GITHUB_ENV"
          echo "FEISHU_KEYWORD=$FEISHU_KEYWORD_VALUE" >> "$GITHUB_ENV"

      - name: Resolve target B schedule
        if: github.event_name == 'schedule' && github.event.schedule == '30 2 * * *'
        env:
          FEISHU_WEBHOOK_VALUE: ${{ secrets.FEISHU_WEBHOOK_B }}
          FEISHU_SECRET_VALUE: ${{ secrets.FEISHU_SECRET_B }}
          FEISHU_KEYWORD_VALUE: ${{ secrets.FEISHU_KEYWORD_B }}
        run: |
          echo "PUSH_TARGET=B" >> "$GITHUB_ENV"
          echo "FEISHU_WEBHOOK=$FEISHU_WEBHOOK_VALUE" >> "$GITHUB_ENV"
          echo "FEISHU_SECRET=$FEISHU_SECRET_VALUE" >> "$GITHUB_ENV"
          echo "FEISHU_KEYWORD=$FEISHU_KEYWORD_VALUE" >> "$GITHUB_ENV"

      - name: Resolve target A manual
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.target_group == 'A'
        env:
          FEISHU_WEBHOOK_VALUE: ${{ secrets.FEISHU_WEBHOOK_A }}
          FEISHU_SECRET_VALUE: ${{ secrets.FEISHU_SECRET_A }}
          FEISHU_KEYWORD_VALUE: ${{ secrets.FEISHU_KEYWORD_A }}
        run: |
          echo "PUSH_TARGET=A" >> "$GITHUB_ENV"
          echo "FEISHU_WEBHOOK=$FEISHU_WEBHOOK_VALUE" >> "$GITHUB_ENV"
          echo "FEISHU_SECRET=$FEISHU_SECRET_VALUE" >> "$GITHUB_ENV"
          echo "FEISHU_KEYWORD=$FEISHU_KEYWORD_VALUE" >> "$GITHUB_ENV"

      - name: Resolve target B manual
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.target_group == 'B'
        env:
          FEISHU_WEBHOOK_VALUE: ${{ secrets.FEISHU_WEBHOOK_B }}
          FEISHU_SECRET_VALUE: ${{ secrets.FEISHU_SECRET_B }}
          FEISHU_KEYWORD_VALUE: ${{ secrets.FEISHU_KEYWORD_B }}
        run: |
          echo "PUSH_TARGET=B" >> "$GITHUB_ENV"
          echo "FEISHU_WEBHOOK=$FEISHU_WEBHOOK_VALUE" >> "$GITHUB_ENV"
          echo "FEISHU_SECRET=$FEISHU_SECRET_VALUE" >> "$GITHUB_ENV"
          echo "FEISHU_KEYWORD=$FEISHU_KEYWORD_VALUE" >> "$GITHUB_ENV"

      - name: Validate target config
        run: |
          test -n "$PUSH_TARGET"
          test -n "$FEISHU_WEBHOOK"
          echo "Resolved push target: $PUSH_TARGET"

      - name: Run sender
        env:
          TARGET_DATE: ${{ github.event.inputs.target_date }}
          PREVIEW_ONLY: ${{ github.event.inputs.preview_only || 'false' }}
          TIME_ZONE: Asia/Shanghai
          PUSH_TARGET: ${{ env.PUSH_TARGET }}
          FEISHU_WEBHOOK: ${{ env.FEISHU_WEBHOOK }}
          FEISHU_SECRET: ${{ env.FEISHU_SECRET }}
          FEISHU_KEYWORD: ${{ env.FEISHU_KEYWORD }}
        run: node report-run.js

      - name: Print preview summary
        if: always()
        run: |
          echo "=== preview/latest.log ==="
          if [ -f preview/latest.log ]; then
            cat preview/latest.log
          else
            echo "preview/latest.log not found"
          fi

          echo "=== preview/latest.json ==="
          if [ -f preview/latest.json ]; then
            cat preview/latest.json
          else
            echo "preview/latest.json not found"
          fi

          echo "=== preview/latest.md ==="
          if [ -f preview/latest.md ]; then
            cat preview/latest.md
          else
            echo "preview/latest.md not found"
          fi

      - name: Upload preview artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 2firsts-preview-${{ env.PUSH_TARGET || 'unknown' }}
          path: preview/
          if-no-files-found: warn
