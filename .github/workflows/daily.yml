name: Push 2Firsts Daily Report

on:
  schedule:
    - cron: "36 1 * * *"
  workflow_dispatch:
    inputs:
      target_date:
        description: Optional date in YYYY-MM-DD format. Leave blank to use today in Asia/Shanghai.
        required: false
        default: ""
      preview_only:
        description: true = only generate preview artifact, false = actually send to Feishu
        required: true
        type: choice
        options:
          - "false"
          - "true"
        default: "false"

jobs:
  run-job:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run sender
        env:
          TARGET_DATE: ${{ github.event.inputs.target_date }}
          PREVIEW_ONLY: ${{ github.event.inputs.preview_only || 'false' }}
          TIME_ZONE: Asia/Shanghai
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
          FEISHU_KEYWORD: ${{ secrets.FEISHU_KEYWORD }}
        run: node index.js

      - name: Print preview summary
        if: always()
        run: |
          echo "=== preview/latest.log ==="
          if [ -f preview/latest.log ]; then
            cat preview/latest.log
          else
            echo "preview/latest.log not found"
          fi

          echo "=== preview/latest.md ==="
          if [ -f preview/latest.md ]; then
            cat preview/latest.md
          else
            echo "preview/latest.md not found"
          fi

      - name: Upload preview artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 2firsts-preview
          path: preview/
          if-no-files-found: warn
